name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: |
          npm run build
          if [ -d "dist/client" ]; then
            mv dist/client/* dist/
          fi
          # Ensure index.html exists for Capacitor and find the main JS bundle
          if [ ! -f "dist/index.html" ]; then
            MAIN_JS=$(ls dist/assets/index-*.js | head -n 1 | xargs basename)
            echo "<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><title>FinFlow</title></head><body><div id=\"root\"></div><script type=\"module\" src=\"/assets/$MAIN_JS\"></script></body></html>" > dist/index.html
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build with Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: finflow-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
